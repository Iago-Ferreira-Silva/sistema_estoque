<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Produtos — EstoqueIF</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/produtos.css" />
</head>
<body>

  <div class="app-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-logo">📦</span>
        <span class="sidebar-title">EstoqueIF</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="produtos.html" class="nav-item active">
          <span class="nav-icon">📦</span>
          <span class="nav-label">Produtos</span>
        </a>
        <a href="setores.html" class="nav-item">
          <span class="nav-icon">🏢</span>
          <span class="nav-label">Setores</span>
        </a>
        <a href="movimentacoes.html" class="nav-item">
          <span class="nav-icon">🔄</span>
          <span class="nav-label">Movimentações</span>
        </a>
        <a href="solicitacoes.html" class="nav-item">
          <span class="nav-icon">🧾</span>
          <span class="nav-label">Solicitações</span>
        </a>
        <a href="relatorios.html" class="nav-item">
          <span class="nav-icon">📊</span>
          <span class="nav-label">Relatórios</span>
        </a>
        <a href="usuarios.html" class="nav-item">
          <span class="nav-icon">👤</span>
          <span class="nav-label">Usuários</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">IA</div>
          <div class="user-details">
            <span class="user-name">Iago Ferreira</span>
            <span class="user-role">Gestor</span>
          </div>
        </div>
        <button class="btn-logout" id="btnLogout" title="Sair">Sair</button>
      </div>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="main-content">

      <header class="topbar">
        <button class="sidebar-toggle" id="sidebarToggle">☰</button>
        <div class="topbar-info">
          <h1 class="page-title">Produtos</h1>
          <span class="page-date" id="currentDate"></span>
        </div>
      </header>

      <main class="content-area">

        <!-- BARRA DE AÇÕES -->
        <div class="actions-bar">
          <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input
              type="text"
              id="searchInput"
              class="search-input"
              placeholder="Buscar produto..."
            />
          </div>
          <div class="actions-right">
            <select id="filterCategoria" class="filter-select">
              <option value="">Todas as categorias</option>
              <option value="limpeza">Limpeza</option>
              <option value="escritorio">Escritório</option>
              <option value="higiene">Higiene</option>
            </select>
            <button class="btn-primary" id="btnNovoProduto">+ Novo Produto</button>
          </div>
        </div>

        <!-- TABELA DE PRODUTOS -->
        <div class="card">
          <div class="table-wrapper">
            <table class="data-table" id="produtosTable">
              <thead>
                <tr>
                  <th>Produto</th>
                  <th>Categoria</th>
                  <th>Unidade</th>
                  <th>Qtd. Atual</th>
                  <th>Qtd. Mínima</th>
                  <th>Status</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="produtosBody">
                <!-- Populado via JS -->
              </tbody>
            </table>
          </div>
          <div class="table-empty" id="tableEmpty" hidden>
            <span>📭</span>
            <p>Nenhum produto encontrado.</p>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- MODAL DE CADASTRO/EDIÇÃO -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Novo Produto</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>

      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label for="nomeProduto">Nome do Produto</label>
            <input type="text" id="nomeProduto" placeholder="Ex: Papel A4" />
          </div>
          <div class="form-group">
            <label for="categoria">Categoria</label>
            <select id="categoria">
              <option value="">Selecione...</option>
              <option value="limpeza">Limpeza</option>
              <option value="escritorio">Escritório</option>
              <option value="higiene">Higiene</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="unidade">Unidade de Medida</label>
            <select id="unidade">
              <option value="un">Unidade (un)</option>
              <option value="cx">Caixa (cx)</option>
              <option value="pct">Pacote (pct)</option>
              <option value="lt">Litro (lt)</option>
              <option value="kg">Quilo (kg)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="qtdAtual">Quantidade Atual</label>
            <input type="number" id="qtdAtual" min="0" placeholder="0" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="qtdMinima">Quantidade Mínima</label>
            <input type="number" id="qtdMinima" min="0" placeholder="0" />
          </div>
          <div class="form-group">
            <label for="descricao">Descrição (opcional)</label>
            <input type="text" id="descricao" placeholder="Observações sobre o produto" />
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-secondary" id="btnCancelar">Cancelar</button>
        <button class="btn-primary" id="btnSalvar">Salvar Produto</button>
      </div>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/produtos.js"></script>
</body>
</html>
